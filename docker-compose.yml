services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: farmsjose
      POSTGRES_PASSWORD: farmsjose123
      POSTGRES_DB: farmsjose
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmsjose"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8001"
      - "5678:5678"
    environment:
      DATABASE_URL: postgresql+asyncpg://farmsjose:farmsjose123@db:5432/farmsjose
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
