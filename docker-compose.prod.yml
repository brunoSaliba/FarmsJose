services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-farmsjose}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-farmsjose}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farmsjose}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-farmsjose}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-farmsjose}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      COOKIE_SECURE: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost"]'}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@farmsjose.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      PORT: ${BACKEND_PORT:-8001}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:${FRONTEND_PORT:-80}"
    environment:
      BACKEND_URL: http://backend:${BACKEND_PORT:-8001}
      PORT: ${FRONTEND_PORT:-80}
    depends_on:
      - backend

volumes:
  pgdata:
