services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-farmsjose}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-farmsjose}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farmsjose}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/brunosaliba/farmsjose/backend:latest
    restart: unless-stopped
    expose:
      - "8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-farmsjose}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-farmsjose}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      COOKIE_SECURE: "true"
      CORS_ORIGINS: '["https://${DOMAIN}"]'
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@farmsjose.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      PORT: "8001"
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/brunosaliba/farmsjose/frontend:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      BACKEND_URL: http://backend:8001
      PORT: "3000"
    depends_on:
      - backend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
